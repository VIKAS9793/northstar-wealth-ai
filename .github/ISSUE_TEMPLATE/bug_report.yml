name: Bug Report
description: Create a report to help us improve the application
title: "[BUG]: <short description>"
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the bug?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: What OS, browser, and Node.js version are you using?
    validations:
      required: true
